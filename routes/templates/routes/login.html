{% extends "routes/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card" style="margin-top: 3rem; border-top: 5px solid #27ae60; animation: slideInRight 0.8s ease-out;">
            <div class="card-body" style="padding: 3rem;">
                <h3 class="card-title mb-4" style="color: #1a237e; font-weight: 800; text-align: center; font-size: 2rem;">
                    <i class="fas fa-sign-in-alt" style="display: block; margin-bottom: 0.5rem; color: #27ae60;"></i>
                    Login
                </h3>
                
                {% if message %}
                    <div class="alert alert-danger" style="border-radius: 10px; border: none; background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%); color: #721c24;">
                        <i class="fas fa-exclamation-circle" style="margin-right: 0.5rem;"></i> {{ message }}
                    </div>
                {% endif %}
                
                <form method="POST" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user" style="color: #3498db; margin-right: 0.5rem;"></i> Username
                        </label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required style="border-color: #3498db;">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock" style="color: #e74c3c; margin-right: 0.5rem;"></i> Password
                        </label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required style="border-color: #e74c3c;">
                    </div>
                    <button type="submit" class="btn btn-success w-100" style="padding: 1rem; font-size: 1.1rem; font-weight: 700;">
                        <i class="fas fa-check-circle" style="margin-right: 0.5rem;"></i>
                        Login
                    </button>
                </form>
                
                <hr style="border-color: #ecf0f1; margin: 2rem 0; border: 2px dashed #ddd;">
                
                <p class="text-center" style="color: #7f8c8d; margin-bottom: 0;">
                    Don't have an account? 
                    <br>
                    <a href="{% url 'register' %}" style="color: #3498db; font-weight: 700; text-decoration: none; font-size: 1.05rem;">
                        <i class="fas fa-user-plus" style="margin-right: 0.3rem;"></i>
                        Register here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
